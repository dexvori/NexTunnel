name: Build NexTunnel APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Descarregar index.html
        run: |
          mkdir -p app/src/main/assets
          curl -L "https://drive.google.com/uc?export=download&id=1DPI2FH9jUBworM0IS1Kvwd88-0RLmHvI" -o app/src/main/assets/index.html
          echo "Tamanho: $(wc -c < app/src/main/assets/index.html) bytes"

      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Configurar Android SDK
        uses: android-actions/setup-android@v3

      - name: Instalar Gradle Wrapper
        run: |
          gradle wrapper --gradle-version 8.4
          chmod +x gradlew

      - name: Build APK (debug)
        run: ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: NexTunnel-debug
          path: app/build/outputs/apk/debug/app-debug.apk
