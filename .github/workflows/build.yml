name: Build NexTunnel APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Descarregar index.html
        run: |
          mkdir -p app/src/main/assets
          curl -L "https://download1472.mediafire.com/tyu77gd6oidgItsRhVPrgNTgDbC0FQH9f4gkR_aidNzCS499vRPEqqfcuBSMQMkmZ5EMqDSRUKcapJd4c9R0-A89VUxDx7e0WwoVdLVKkAXB9eUaxQSEx00xWuxcFP8l8CZZJ4qBB-EhnENTvCRwZp4xxmNU-KJIMJzKkeddnqDxyGe9/5gizpns4wqx0yja/index.html" -o app/src/main/assets/index.html
          echo "Tamanho do index.html: $(wc -c < app/src/main/assets/index.html) bytes"

      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Configurar Android SDK
        uses: android-actions/setup-android@v3

      - name: Instalar Gradle Wrapper
        run: |
          gradle wrapper --gradle-version 8.4
          chmod +x gradlew

      - name: Build APK (debug)
        run: ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: NexTunnel-debug
          path: app/build/outputs/apk/debug/app-debug.apk
